# Production configuration
# Use: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  importer:
    # Run cron scheduler in production
    command: cron
    # No volume mounts - use baked-in code
    volumes: []
    restart: unless-stopped

  dashboard:
    # Run production build (default CMD from Dockerfile)
    # No volume mounts - use baked-in standalone build
    volumes: []
    restart: unless-stopped
