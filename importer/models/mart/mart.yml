  - name: fct_inventory_history
    description: >
      Daily sales-based inventory estimate. QuickBooks quantity_on_hand rows are
      treated as occasional anchors; between anchors, inventory moves according to
      `int_quickbooks__inventory_movements`, including sales, bill receipts, inventory
      adjustments, build assembly production, and build component consumption.
      Future-dated committed demand is kept out of actual stock movement. Open
      unreceived POs are exposed as inbound planning fields, but are not counted as
      on-hand.
    columns:
      - name: sku
        description: Inventory item/SKU
        tests:
          - not_null
      
      - name: inventory_date
        description: Date for the estimated inventory level
        tests:
          - not_null
      
      - name: estimated_ending_inventory
        description: Estimated end-of-day quantity on hand in sellable warehouse boxes
        tests:
          - not_null

      - name: anchor_date
        description: QuickBooks load date used as the nearest inventory anchor
        tests:
          - not_null

      - name: anchor_quantity_on_hand
        description: Adjusted sellable quantity on hand at the anchor date after subtracting future-dated vendor bill receipts that QuickBooks includes in quantity_on_hand before physical receipt.
        tests:
          - not_null

      - name: quickbooks_quantity_on_hand
        description: Raw QuickBooks quantity_on_hand reported in the item export before future-dated receipt adjustment.

      - name: future_receipt_qty_after_anchor
        description: Vendor bill receipt quantity dated after the anchor date that was removed from the QuickBooks-reported quantity_on_hand.

      - name: future_receipt_line_count_after_anchor
        description: Count of future-dated vendor bill receipt lines removed from the QuickBooks-reported quantity_on_hand.

      - name: inventory_status
        description: Risk bucket based on estimated inventory and trailing 90-day sales velocity

      - name: receipt_qty
        description: Deduped bill quantity received on this date, excluding DPC Transfer Inventory

      - name: adjustment_qty
        description: Deduped inventory adjustment quantity on this date

      - name: open_po_quantity
        description: Quantity on open, unreceived, non-manually-closed purchase orders

      - name: has_open_po_inbound
        description: Whether this SKU has open PO quantity available for inbound planning
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sku
              - inventory_date

  - name: fct_product_pricing_history
    description: >
      Fact table tracking product pricing changes and history.
    columns:
      - name: product_service
        description: Name of the product or service
        tests:
          - not_null
      
      - name: order_date
        description: Transaction date for the observed price point
        tests:
          - not_null
      
      - name: avg_unit_price
        description: Average unit price observed for the product on that date
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_service
              - order_date

  - name: mart_company_period_metrics
    description: >
      Company period-based metrics mart for dashboard analytics.
      Pre-calculates revenue and order metrics by company across multiple time periods.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - company_domain_key
              - period_type
    columns:
      - name: company_domain_key
        description: Unique identifier for the consolidated company
        tests:
          - not_null

      - name: period_type
        description: Time period type (trailing_7d, trailing_30d, trailing_90d, trailing_1y, all_time)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['trailing_7d', 'trailing_30d', 'trailing_90d', 'trailing_1y', 'all_time']

      - name: total_revenue
        description: Total revenue for this company in this period
        tests:
          - not_null

  - name: mart_product_margin_analytics
    description: >
      Time-series margin analytics by product/SKU for dashboard consumption.
      Provides aggregated actual vs standard margins with temporal dimensions.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sku
              - time_period
              - period_date
    columns:
      - name: sku
        description: Product/service code (SKU)
        tests:
          - not_null

      - name: time_period
        description: Time period aggregation level (daily, monthly)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['daily', 'monthly']

      - name: period_date
        description: Date for the period (sale_date for daily, order_month for monthly)
        tests:
          - not_null

  - name: mart_product_unit_sales
    description: >
      This mart table provides aggregated unit sales data for frontend consumption and analytics.
      Enables queries like "5,234 UNITS of SP10 sold in last 30 days" by aggregating individual unit sales by product and time period.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - product_name
              - sale_date
    columns:
      - name: product_name
        description: Product name
        tests:
          - not_null

      - name: sale_date
        description: Date of the sales transaction
        tests:
          - not_null

      - name: total_units_sold
        description: Total units sold on this date for this product
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "> 0"

  - name: base_fct_orders_current
    description: >
      Current-safe order-grain view over fct_orders. It excludes future-dated orders
      for current revenue, order, AR, and recency metrics while leaving fct_orders
      available for committed demand and backlog analysis.
    columns:
      - name: order_key
        description: Stable transaction-grain key; QuickBooks order_number alone is not unique.
        tests:
          - not_null
          - unique
      - name: order_date
        description: Current business metric order date; guaranteed not to be after the dbt run date.
        tests:
          - not_null

  - name: base_fct_order_line_items_current
    description: >
      Current-safe line-item view for product, margin, and company analytics.
      One row per source line item whose parent order is present in base_fct_orders_current.
    columns:
      - name: line_item_id
        description: Source line identifier at line-item grain.
        tests:
          - not_null
          - unique
      - name: order_key
        description: Stable parent order key used to inherit the current-date contract.
        tests:
          - not_null
      - name: actual_margin_amount
        description: "Unit-level actual margin amount: actual unit price minus purchase cost. Extended margin must multiply this value by product_service_quantity."
      - name: price_discount_amount
        description: "Unit-level discount amount from the standard sales price. Extended discount must multiply this value by product_service_quantity."

  - name: mart_ar_invoice_aging
    description: >
      Current AR at invoice grain. One row per open current invoice, excluding future-dated
      invoices so DSO and cash-flow metrics do not treat committed future invoices as receivables.
    columns:
      - name: order_key
        description: Stable invoice transaction key.
        tests:
          - not_null
          - unique
      - name: order_date
        description: Invoice date used for current aging calculations.
        tests:
          - not_null
      - name: days_outstanding
        description: Non-negative age of the invoice in days from order_date to current_date.
        tests:
          - not_null
      - name: days_past_due
        description: Non-negative days after due_date, or zero when not yet due.
        tests:
          - not_null

  - name: mart_ar_customer_summary
    description: >
      Customer-grain AR rollup derived from mart_ar_invoice_aging. Kept separate from
      invoice rows to avoid dashboard double counting.
    columns:
      - name: customer
        description: QuickBooks customer name for the AR customer grain.
        tests:
          - not_null
          - unique
      - name: total_ar_amount
        description: Sum of open current invoice balances for this customer.
        tests:
          - not_null

  - name: mart_ar_bucket_summary
    description: >
      Aging-bucket AR rollup derived from mart_ar_invoice_aging. One row per aging bucket
      and risk classification for compact dashboard summaries.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - aging_bucket
              - collection_risk
    columns:
      - name: aging_bucket
        description: Invoice aging bucket based on days_outstanding.
        tests:
          - not_null
      - name: total_ar_amount
        description: Sum of open current invoice balances in the bucket.
        tests:
          - not_null

  - name: mart_account_attention_queue
    description: >
      Read-only prioritized queue of corporate accounts that deserve attention because
      they have an established purchasing pattern, are at least top-quartile by lifetime
      revenue, and now show a risk signal such as stale activity, lost/declining trend,
      or an account-health risk flag. Contact fields are support context only.
    columns:
      - name: company_domain_key
        description: Consolidated company key at one-row-per-company queue grain.
        tests:
          - not_null
          - unique
      - name: attention_score
        description: >
          Priority score derived from explicit reason-code flags for established,
          top-quartile accounts with current risk, adjusted by recency so stale accounts
          retain less outreach priority after one year and receive only residual priority
          once they are 1,500+ days from their last order.
        tests:
          - not_null
      - name: reason_codes
        description: Semicolon-delimited reason codes explaining why the account is queued.
        tests:
          - not_null
      - name: has_established_purchase_pattern
        description: >
          True when the account has enough repeat history to represent a buying pattern:
          at least three lifetime orders, or at least two orders spread across multiple
          active years.
      - name: is_meaningful_revenue_account
        description: True when lifetime revenue is in the top quartile of corporate accounts.
      - name: has_current_risk_issue
        description: >
          True when current health or trend signals indicate risk, including stale last
          order activity, lost or declining growth trend, or the company health at-risk flag.

  - name: mart_product_growth_quality
    description: >
      SKU-level current product economics mart for profitable growth, discount leakage,
      customer concentration, inventory posture, and trend quality. Margin and discount
      dollars use quantity-weighted extended calculations from line items.
    columns:
      - name: sku
        description: Merchandise SKU at the mart grain.
        tests:
          - not_null
          - unique
      - name: gross_margin_amount
        description: "Extended margin dollars: sum of unit margin multiplied by line quantity."
      - name: current_year_revenue
        description: Revenue from January 1 of the current year through the current date.
      - name: prior_year_same_period_revenue
        description: Revenue from January 1 of the prior year through the same calendar day in the prior year.
      - name: yoy_revenue_growth_pct
        description: Percent change between current year-to-date revenue and prior-year revenue for the same year-to-date period.
      - name: discount_leakage_amount
        description: "Extended positive discount dollars: sum of unit discount multiplied by line quantity."

  - name: mart_business_cockpit_summary
    description: >
      Single-row dashboard cockpit summary combining current-safe sales, AR, inventory,
      attribution coverage, future-order visibility, and account concentration metrics.
    columns:
      - name: as_of_date
        description: Date anchoring the current dashboard snapshot.
        tests:
          - not_null
          - unique
      - name: prior_trailing_365d_revenue
        description: Revenue from the 365-day comparison window immediately before the current trailing 365 days, used to calculate rolling annual growth.
      - name: trailing_365d_revenue_growth_pct
        description: Percent change between current trailing 365-day revenue and the prior 365-day comparison window; null when the prior window has no revenue.

  - name: mart_large_recent_orders
    description: >
      Business-cockpit order signal showing recent high-value current-safe orders.
      The mart compares orders from the last 45 days against trailing-year order size,
      where unusually large means the order amount is at least the greater of the
      trailing-year 90th percentile order amount or two times the trailing-year average.
      Order numbers are display values and may repeat; order_key is the stable row key.
    columns:
      - name: order_key
        description: Stable transaction-grain key from fct_orders.
        tests:
          - not_null
          - unique
      - name: order_number
        description: Printed QuickBooks order or invoice number for display and drill-in.
        tests:
          - not_null
      - name: order_date
        description: Order date. This model only includes current-safe orders in the last 45 days.
        tests:
          - not_null
      - name: total_amount
        description: Order total used for ranking and unusually-large detection.
        tests:
          - not_null
      - name: benchmark_amount
        description: Greater of trailing-year p90 order amount and two times trailing-year average order amount.
        tests:
          - not_null
      - name: multiple_of_average
        description: Order amount divided by the trailing-year average order amount.
        tests:
          - not_null
      - name: is_unusually_large
        description: True when total_amount is greater than or equal to benchmark_amount.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false

  - name: mart_order_channel_period_metrics
    description: >
      Orders-dashboard sales channel metrics by four rolling trailing-year periods.
      Each row is one sales channel in one period. Channels that are not useful for
      this report, such as Contractor and EXPORT from WWD, are excluded here so the
      dashboard can display trend and share without owning the business filter.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sales_channel
              - period_index
    columns:
      - name: sales_channel
        description: Sales channel label from current-safe orders.
        tests:
          - not_null
      - name: period_index
        description: Zero-based rolling annual period index; 0 is the most recent trailing year.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]
                quote: false
      - name: period_start
        description: Inclusive start date for the rolling annual period.
        tests:
          - not_null
      - name: period_end
        description: Inclusive end date for the rolling annual period.
        tests:
          - not_null
      - name: total_revenue
        description: Total order revenue for this channel and rolling period.
        tests:
          - not_null
      - name: order_count
        description: Count of current-safe orders for this channel and rolling period.
        tests:
          - not_null

  - name: mart_order_segment_period_metrics
    description: >
      Orders-dashboard customer segment metrics by four rolling trailing-year periods.
      Each row is one customer segment in one period. The low-volume Export segment
      is excluded here because it is not useful on this dashboard.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_segment
              - period_index
    columns:
      - name: customer_segment
        description: Customer segment label from current-safe orders.
        tests:
          - not_null
      - name: period_index
        description: Zero-based rolling annual period index; 0 is the most recent trailing year.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3]
                quote: false
      - name: period_start
        description: Inclusive start date for the rolling annual period.
        tests:
          - not_null
      - name: period_end
        description: Inclusive end date for the rolling annual period.
        tests:
          - not_null
      - name: total_revenue
        description: Total order revenue for this customer segment and rolling period.
        tests:
          - not_null
      - name: order_count
        description: Count of current-safe orders for this customer segment and rolling period.
        tests:
          - not_null

  - name: mart_data_quality_flags
    description: >
      Dashboard-facing data quality strip. One row per monitored condition so the UI can
      show future-order leakage, inventory freshness, and attribution coverage explicitly.
    columns:
      - name: flag_key
        description: Stable identifier for the monitored data quality condition.
        tests:
          - not_null
          - unique
      - name: severity
        description: Current flag severity for dashboard display.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ok', 'warn', 'critical']
