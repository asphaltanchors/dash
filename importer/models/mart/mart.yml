version: 2

models:
  - name: dim_accounts_receivable_aging
    description: >
      Comprehensive accounts receivable aging analysis for cash flow management.
      Provides individual invoice details, customer summaries, and aging bucket analysis
      for collection efficiency tracking and risk assessment.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - analysis_level
              - order_number
              - customer
              - customer_segment
    columns:
      - name: analysis_level
        description: Type of analysis (Individual Invoices, Customer Summary, Aging Summary)
        tests:
          - not_null
      - name: aging_bucket
        description: Age classification (Current, Past Due, Overdue, Severely Overdue)
      - name: collection_risk
        description: Risk assessment (Low, Medium, High, Critical Risk)
      - name: days_outstanding
        description: Number of days since invoice was created
      - name: days_past_due
        description: Number of days past the due date (0 if not past due)
      - name: payment_pattern
        description: Customer payment behavior classification

  - name: fct_dso_metrics
    description: >
      Key Days Sales Outstanding (DSO) metrics and performance indicators.
      Calculates DSO over multiple time periods, collection efficiency,
      and segment-level receivables analysis for cash flow monitoring.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - metric_category
              - period
              - customer_segment
    columns:
      - name: metric_category
        description: Type of DSO metric (Overall DSO Metrics, Segment AR Breakdown)
        tests:
          - not_null
      - name: dso_days
        description: Days Sales Outstanding calculation
      - name: collection_efficiency_pct
        description: Collection efficiency as percentage of sales
      - name: dso_assessment
        description: Performance rating (Excellent, Good, Fair, Poor)
        tests:
          - accepted_values:
              arguments:
                values: ['Excellent', 'Good', 'Fair', 'Poor', 'Good Payer', 'Slow Payer', 'Problem Segment']
      - name: total_accounts_receivable
        description: Total outstanding receivables amount
        tests:
          - not_null

  - name: mart_inventory_sku_policy
    description: >
      SKU-level inventory planning policy table. One row per SKU in the latest inventory
      snapshot, routing each SKU to the reorder/forecasting approach its history can support
      before any automatic reorder quantity is calculated.
    columns:
      - name: sku
        description: QuickBooks item name for the tracked inventory SKU.
        tests:
          - not_null
          - unique

      - name: inventory_as_of_date
        description: Latest inventory snapshot date used for this policy classification.
        tests:
          - not_null

      - name: policy_bucket
        description: Forecasting or review policy chosen from demand history, item type, assembly usage, and FBA signals.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SKU_SEASONAL_TREND_MODEL
                  - SKU_BASELINE_VARIANT_SEASONAL_MODEL
                  - ASSEMBLY_FINISHED_GOOD_MODEL
                  - FBA_REPLENISHMENT_MODEL
                  - COMPONENT_PACKAGING_MODEL
                  - SPARSE_OR_NEW_SKU_BASELINE_MODEL
                  - STOCKED_NO_RECENT_DEMAND_REVIEW
                  - NO_ACTION_OR_ARCHIVE

      - name: policy_assignment_reason
        description: Compact reason code for the rule that assigned the SKU to its policy bucket.
        tests:
          - not_null

      - name: policy_validation_status
        description: Whether the assigned policy bucket passed the current validation checks or should be reviewed.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ok', 'review']

      - name: policy_review_flags
        description: Semicolon-delimited validation flags explaining why the SKU classification should be reviewed.

      - name: forecast_method
        description: Human-readable method hint for the forecast or review workflow assigned to the SKU.
        tests:
          - not_null

      - name: confidence_level
        description: Coarse confidence level for whether the SKU can be forecast automatically or needs manual review.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high', 'medium', 'low', 'manual_review', 'exclude']

      - name: requires_manual_review
        description: Boolean flag for SKUs that should not receive a blind automatic reorder recommendation.
        tests:
          - not_null

      - name: current_on_hand_qty
        description: Latest adjusted sellable quantity on hand from `fct_inventory_history`, after removing future-dated receipts embedded in the QuickBooks export.

      - name: is_suppressed_from_inventory_planning
        description: Flag for SKUs deliberately hidden from inventory planning because they are obsolete, pricing artifacts, or otherwise not actionable inventory.

      - name: inventory_suppression_reason
        description: Compact reason code explaining why a SKU is suppressed from inventory planning, including obsolete SKUs, artifacts, customer-specific items, and supplier fallback exceptions.

      - name: months_with_sales_since_2023
        description: Count of months since 2023 with non-future sales demand, used to decide whether SKU-level seasonality is supportable.

      - name: component_consumed_qty_since_2024
        description: Quantity consumed by build assembly component rows since 2024, used for component and packaging planning.

      - name: build_produced_qty_since_2024
        description: Quantity produced by build assembly headers since 2024, used for assembly finished-good planning.

      - name: fba_transfer_in_qty_since_2024
        description: Positive FBA-like adjustment quantity since 2024, used to identify Amazon replenishment behavior.

      - name: largest_sales_line_share_2025
        description: Share of 2025 SKU sales represented by the largest single sales line, used to flag outlier-driven demand.

      - name: component_to_sales_qty_ratio_since_2024
        description: Ratio of build component consumption to sales demand since 2024, used to identify dual-use SKUs whose replenishment should be driven by assembly consumption.

    tests:
      - dbt_utils.expression_is_true:
          name: test_inventory_82_6005_suppressed_from_forecast
          arguments:
            expression: >
              sku != '82-6005'
              OR (
                is_suppressed_from_inventory_planning = TRUE
                AND inventory_suppression_reason = 'supplier_fallback_only_when_epx3_unavailable'
                AND policy_bucket = 'NO_ACTION_OR_ARCHIVE'
                AND forecast_method = 'exclude_until_active'
                AND confidence_level = 'exclude'
              )

  - name: mart_inventory_reorder_recommendations
    description: >
      First-pass SKU reorder recommendations from latest trusted stock, SKU policy, recent demand,
      committed future demand, inbound purchase quantities, lead-time-aware expected receipt date,
      and safety stock.
      One row per tracked SKU in the latest inventory snapshot. Manual-review policy buckets are
      still shown, but their `should_reorder` flag is deliberately conservative.
    columns:
      - name: sku
        description: QuickBooks item name for the tracked inventory SKU.
        tests:
          - not_null
          - unique

      - name: inventory_as_of_date
        description: Latest inventory snapshot date used to anchor the recommendation.
        tests:
          - not_null

      - name: policy_bucket
        description: Forecasting or review policy inherited from `mart_inventory_sku_policy`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - SKU_SEASONAL_TREND_MODEL
                  - SKU_BASELINE_VARIANT_SEASONAL_MODEL
                  - ASSEMBLY_FINISHED_GOOD_MODEL
                  - FBA_REPLENISHMENT_MODEL
                  - COMPONENT_PACKAGING_MODEL
                  - SPARSE_OR_NEW_SKU_BASELINE_MODEL
                  - STOCKED_NO_RECENT_DEMAND_REVIEW
                  - NO_ACTION_OR_ARCHIVE

      - name: policy_assignment_reason
        description: Reason code inherited from `mart_inventory_sku_policy` for the rule that assigned the policy bucket.
        tests:
          - not_null

      - name: policy_validation_status
        description: Policy classification validation status inherited from `mart_inventory_sku_policy`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ok', 'review']

      - name: policy_review_flags
        description: Semicolon-delimited policy validation flags inherited from `mart_inventory_sku_policy`.

      - name: confidence_level
        description: Coarse confidence level for automatic reorder suitability.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['high', 'medium', 'low', 'manual_review', 'exclude']

      - name: requires_manual_review
        description: Boolean flag for SKUs that should be reviewed before an automatic order is placed.
        tests:
          - not_null

      - name: should_reorder
        description: Conservative boolean recommendation after applying policy, stock position, demand, and manual-review gates.
        tests:
          - not_null

      - name: reorder_qty
        description: Suggested quantity to order or replenish for target coverage after receipt. This excludes uncovered lead-time demand that replenishment cannot arrive in time to satisfy.
        tests:
          - not_null

      - name: six_pack_units_per_layer
        description: Configured WWD layer multiple in the SKU's native inventory unit, when known. The historical column name says six_pack, but bulk-pack SKUs such as 01-6310.72L are counted in their own item units. Null means no layer rounding rule has been configured for the SKU.

      - name: layer_rounded_reorder_qty
        description: Suggested reorder quantity rounded up to the configured layer multiple when one exists; otherwise equal to `reorder_qty`.

      - name: reorder_layer_count
        description: Number of configured layers represented by `layer_rounded_reorder_qty`, when a SKU has a configured layer multiple.

      - name: layer_rounding_extra_qty
        description: Extra quantity added by rounding `reorder_qty` up to the configured layer multiple.

      - name: reorder_value_at_cost
        description: Suggested reorder quantity multiplied by current QuickBooks purchase cost.

      - name: reorder_by_date
        description: Estimated latest date to trigger replenishment before available position reaches the reorder point.

      - name: projected_stockout_or_safety_date
        description: Estimated date current on-hand reaches safety stock or zero under the current demand rate.

      - name: expected_receipt_date
        description: Date replenishment is expected to arrive if ordered from the inventory snapshot date using the selected lead time.

      - name: preferred_vendor
        description: Vendor selected for planning from configured SKU/vendor override or latest observed SKU purchase/receipt activity.

      - name: assumed_lead_time_days
        description: Lead time used for forecast month, lead-time demand, and expected receipt date, selected from configured SKU/vendor override, observed SKU/vendor median, observed vendor median, or policy default.
        tests:
          - not_null

      - name: lead_time_source
        description: >
          Source of the selected lead time: configured SKU/vendor, observed SKU/vendor median,
          observed vendor median, or policy bucket default.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['configured_sku_vendor', 'observed_sku_vendor_median', 'observed_vendor_median', 'policy_bucket_default']

      - name: planning_override_reason
        description: Reason code for a configured SKU/vendor planning override when one was used.

      - name: configured_lead_time_days
        description: SKU/vendor configured lead time in days, when an explicit planning override exists.

      - name: observed_sku_vendor_lead_time_days
        description: Median days from best available PO opened date to matched bill receipt date for the selected SKU/vendor, when enough history exists.

      - name: observed_sku_vendor_lead_time_count
        description: Count of SKU/vendor PO-to-receipt observations supporting the observed median lead time.

      - name: observed_vendor_lead_time_days
        description: Median days from best available PO opened date to matched bill receipt date for the selected vendor across SKUs.

      - name: observed_vendor_lead_time_count
        description: Count of vendor PO-to-receipt observations supporting the observed vendor median lead time.

      - name: default_policy_lead_time_days
        description: Fallback lead time from the SKU policy bucket when no configured or observed lead time is usable.

      - name: target_coverage_days
        description: >
          Target days of coverage used to size the first-pass reorder quantity. Explicit SKU/vendor
          planning overrides take precedence; mature seasonal SKUs can use observed SKU/vendor PO
          cycle history bounded to 60-180 days; otherwise this falls back to the policy default.
        tests:
          - not_null

      - name: default_target_coverage_days
        description: Fallback target coverage days from the SKU policy bucket before any configured planning override or observed cycle adjustment.

      - name: target_coverage_source
        description: Source used to select `target_coverage_days`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['configured_sku_vendor', 'observed_sku_vendor_po_cycle', 'policy_bucket_default']

      - name: observed_sku_vendor_order_cycle_days
        description: P75 days between historical purchase order batches for the selected SKU/vendor, used as a dynamic order-cycle target when at least five intervals exist.

      - name: observed_sku_vendor_median_order_cycle_days
        description: Median days between historical purchase order batches for the selected SKU/vendor, exposed for audit beside the P75 target input.

      - name: observed_sku_vendor_order_cycle_count
        description: Count of observed intervals between historical purchase order batches for the selected SKU/vendor.

      - name: available_position_qty
        description: Current on hand plus total real inbound quantity, using the greater of parsed open PO quantity and QuickBooks quantity on order to avoid double-counting open POs, plus future-dated receipt quantity removed from on hand, minus committed future demand.

      - name: committed_demand_before_expected_receipt_qty
        description: Future committed demand dated on or before the expected replenishment receipt date.

      - name: inbound_qty_by_expected_receipt_date
        description: Existing inbound quantity counted as available by the expected receipt date, including open PO quantity due by that date and future-dated receipt quantity with receipt dates on or before that date.

      - name: is_suppressed_from_inventory_planning
        description: Flag inherited from `mart_inventory_sku_policy` for SKUs deliberately excluded from the inventory worklist.

      - name: inventory_suppression_reason
        description: Reason code inherited from `mart_inventory_sku_policy` for inventory planning suppression.

      - name: open_po_line_count
        description: Count of parsed QuickBooks purchase order lines that are not fully received and not manually closed.

      - name: future_receipt_line_count_after_anchor
        description: Count of future-dated vendor bill receipt lines removed from QuickBooks-reported quantity_on_hand.

      - name: forecast_model_detail
        description: Specific forecast model path used after policy routing, including seasonality fallback and capped-demand choices.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - sku_seasonality_with_growth
                  - family_material_seasonality_with_growth
                  - capped_trailing_sku_baseline
                  - sparse_or_new_observed_velocity
                  - direct_and_kit_sales_component_equivalent
                  - component_consumption_since_2024
                  - no_automatic_forecast

      - name: forecast_daily_qty
        description: Daily demand forecast chosen from capped SKU demand, SKU seasonality, family/material seasonality fallback, growth trend, sparse/new SKU recent velocity, kit-equivalent component demand, or component consumption.

      - name: sku_baseline_monthly_qty
        description: Capped monthly SKU demand baseline before seasonality and growth are applied.

      - name: applied_seasonality_index
        description: Seasonality multiplier used by the selected forecast model; 1.0 means no seasonal adjustment was applied.

      - name: applied_growth_factor
        description: Growth multiplier used by the selected forecast model after conservative clamping; 1.0 means no trend adjustment was applied.

      - name: capped_sales_qty_12m
        description: Last 12 complete months of sales demand after line-level outlier capping.

      - name: uncapped_sales_qty_12m
        description: Last 12 complete months of raw sales demand before line-level outlier capping.

      - name: capped_reduction_qty_12m
        description: Quantity removed from last-12-month demand by line-level outlier capping.

      - name: sku_seasonality_index
        description: SKU-level seasonal index for the forecast month, when the SKU has enough monthly history.

      - name: family_material_seasonality_index
        description: Family/material seasonal fallback index for the forecast month.

      - name: demand_growth_factor
        description: SKU-level growth factor from recent 12-month demand compared with the previous 12 months, conservatively clamped.

      - name: forecast_lead_time_qty
        description: Forecast demand during the selected lead time.

      - name: projected_position_at_expected_receipt_qty
        description: Projected stock position at expected receipt date before adding a new reorder, after lead-time forecast demand and committed demand due before receipt. Negative values are exposed as stockout risk but are floored to zero for reorder sizing.

      - name: uncovered_lead_time_demand_qty
        description: Units of expected lead-time demand that current stock plus inbound due by receipt date may not cover before replenishment arrives.

      - name: stockout_gap_qty
        description: >
          Alias for uncovered lead-time demand quantity, exposed for dashboard language such as
          "we may miss X units before replenishment arrives."

      - name: safety_stock_qty
        description: >
          Safety stock buffer used in reorder point and reorder quantity calculations. Uses rolling
          p90 historical lead-time demand when enough SKU-level windows exist, otherwise falls back
          to the policy multiplier calculation.

      - name: safety_stock_source
        description: Source used to select `safety_stock_qty`.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['rolling_lead_time_demand_p90', 'policy_multiplier_fallback']

      - name: demand_variability_source
        description: Demand event source used for rolling lead-time variability; sales-driven SKUs use capped sales and component SKUs use build component consumption.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['capped_sales', 'component_consumption']

      - name: policy_safety_stock_qty
        description: Fallback safety stock from the previous policy-multiplier method, retained for audit and for SKUs without enough rolling demand history.

      - name: percentile_safety_stock_qty
        description: Safety stock implied by p90 historical rolling lead-time demand minus forecast lead-time demand, floored at zero.

      - name: variability_sample_windows
        description: Count of historical rolling lead-time windows available for the SKU-level variability calculation.

      - name: variability_windows_with_demand
        description: Count of historical rolling lead-time windows with nonzero demand in the variability calculation.

      - name: avg_historical_lead_time_demand_qty
        description: Average demand quantity across historical rolling lead-time windows using the SKU's selected variability demand source.

      - name: stddev_historical_lead_time_demand_qty
        description: Sample standard deviation of demand quantity across historical rolling lead-time windows.

      - name: p50_historical_lead_time_demand_qty
        description: Median demand quantity across historical rolling lead-time windows.

      - name: p75_historical_lead_time_demand_qty
        description: P75 demand quantity across historical rolling lead-time windows.

      - name: p90_historical_lead_time_demand_qty
        description: P90 demand quantity across historical rolling lead-time windows; this is the selected percentile target for SKU-level safety stock when enough history exists.

      - name: p95_historical_lead_time_demand_qty
        description: P95 demand quantity across historical rolling lead-time windows, exposed for audit and future tuning.

      - name: reorder_point_qty
        description: Lead-time demand plus safety stock.

      - name: recommendation_reason
        description: Compact explanation of why the SKU is or is not recommended for reorder.
        tests:
          - not_null

  - name: mart_inventory_inbound_lines
    description: >
      Line-level inbound inventory details for SKU drilldowns. Combines open, unreceived
      QuickBooks purchase order lines with future-dated vendor bill receipt lines that were
      removed from QuickBooks-reported quantity on hand in `fct_inventory_history`.
    columns:
      - name: inbound_line_id
        description: Stable hash key for the inbound line, built from document, SKU, date, quantity, and source transaction fields.
        tests:
          - not_null
          - unique

      - name: inventory_as_of_date
        description: Latest inventory snapshot date used to classify future receipt lines.
        tests:
          - not_null

      - name: sku
        description: QuickBooks item name after SKU normalization. Vendor/inbound aliases ending in `.IN` or ` IN`, such as `ADH-EPX2-TUB10LB.IN` and `82-6002 IN`, are pooled into the base sellable SKU for inventory planning.
        tests:
          - not_null

      - name: inbound_type
        description: Whether the inbound quantity comes from an open purchase order or a future-dated bill receipt.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['OPEN_PO', 'FUTURE_RECEIPT']

      - name: document_number
        description: Purchase order number or bill number from QuickBooks.

      - name: vendor
        description: Vendor or source party from the QuickBooks transaction.

      - name: document_date
        description: PO opened date for open purchase orders, or bill receipt date for future receipts.

      - name: expected_or_receipt_date
        description: Expected purchase order receipt date when available, otherwise PO opened date plus observed lead time; actual future bill receipt date for future receipts.

      - name: quantity
        description: Inbound quantity represented by the source line.
        tests:
          - not_null

      - name: rate
        description: Unit rate from the source line when available.

      - name: amount
        description: Extended source-line amount when available.

      - name: status
        description: Source-line status for explaining why the line is counted as inbound.

      - name: source_transaction_key
        description: Source transaction key built from QuickBooks identifiers.

      - name: inbound_note
        description: Human-readable note explaining how the line should be interpreted in inventory planning.

  - name: mart_wwd_pallet_order_plan
    description: >
      Proposed regular WWD pallet order at SKU-line grain. The plan triggers on the earliest
      non-review WWD layer SKU that should be reordered, then fills the two-pallet target with
      ride-along SKUs allocated by forecasted layer demand. Manual-review and special-order
      candidates are deliberately excluded from this regular order path.
    columns:
      - name: wwd_pallet_order_plan_id
        description: Stable key for the proposed order line, built from the proposal trigger date and SKU.
        tests:
          - not_null
          - unique

      - name: inventory_as_of_date
        description: Inventory snapshot date used by the source reorder mart.
        tests:
          - not_null

      - name: next_order_date
        description: Proposed regular WWD order trigger date from the earliest non-review WWD layer SKU with `should_reorder = true`.
        tests:
          - not_null

      - name: target_layer_count
        description: Target order size in pallet layers. Current WWD rule is two pallets at seven layers each.
        tests:
          - not_null

      - name: order_sequence
        description: Display ordering for the proposed WWD pallet order lines.
        tests:
          - not_null

      - name: order_role
        description: Whether the SKU triggered the order or rides along to fill the pallet target.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['TRIGGER', 'RIDE_ALONG']

      - name: is_ride_along
        description: Boolean convenience flag for `order_role = RIDE_ALONG`.
        tests:
          - not_null

      - name: sku
        description: WWD SKU included in the proposed regular pallet order.
        tests:
          - not_null

      - name: planned_layer_count
        description: Number of whole pallet layers planned for this SKU in the proposed regular order.
        tests:
          - not_null

      - name: planned_buy_qty
        description: Planned buy quantity in the SKU's native inventory units, equal to planned layers times configured units per layer.
        tests:
          - not_null

      - name: planned_buy_cost
        description: Planned buy quantity multiplied by current QuickBooks purchase cost.
        tests:
          - not_null

      - name: total_planned_layer_count
        description: Total planned layers across all rows in the proposed WWD pallet order.

      - name: ride_along_demand_score
        description: Forecasted layer demand per day, used to allocate remaining pallet layers across ride-along SKUs.

  - name: fct_orders
    description: >
      Order-level fact table aggregated from line items.
      One row per QuickBooks transaction, containing order metadata and aggregated measures.
      Printed order numbers are preserved for display but may repeat when QuickBooks reuses a number.
    columns:
      - name: order_key
        description: Stable transaction-grain key built from source type, QuickBooks internal ID, and transaction ID. Use this as the unique order identifier.
        tests:
          - not_null
          - unique

      - name: order_number
        description: Printed QuickBooks order/invoice number. Useful for display and search but not globally unique.
        tests:
          - not_null
      
      - name: order_date
        description: Date when the order was placed
        tests:
          - not_null
      
      - name: customer
        description: Name of the customer who placed the order
      
      - name: total_amount
        description: Total monetary value of the order
        tests:
          - not_null
      
      - name: is_tax_exempt
        description: Boolean flag indicating if the order is tax exempt
      
      - name: item_count
        description: Count of line items in the order
        tests:
          - not_null
      
      - name: source_type
        description: Source of the order (invoice or sales_receipt)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['invoice', 'sales_receipt']
      
      - name: sales_channel
        description: >
          Sales channel attribution based on transaction patterns.
          Indicates HOW the customer purchased (Amazon, Website, Invoice).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Amazon', 'Website', 'Invoice', 'Other']
      
      - name: customer_segment
        description: >
          Customer segment attribution based on business relationship and transaction patterns.
          Indicates WHO the customer is (OEM, Distributor, Direct Consumer, etc.).
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['OEM', 'Distributor', 'Export', 'Direct Consumer', 'B2B Direct', 'Other']
      
      - name: billing_address_country
        description: Normalized billing country (inferred from state if not explicit)
        tests:
          - not_null
      
      - name: shipping_address_country
        description: Normalized shipping country (inferred from state if not explicit)
        tests:
          - not_null
      
      - name: primary_country
        description: Primary country for the order (billing preferred, shipping fallback)
        tests:
          - not_null
      
      - name: country_category
        description: Country category for reporting (United States, Canada, International)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['United States', 'Canada', 'International']
      
      - name: region
        description: Regional grouping (North America, International)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['North America', 'International']

  - name: dim_company_health
    description: >
      Company health dimension providing activity indicators, health scoring, and engagement metrics
      for consolidated companies. Enables business intelligence on account management and growth opportunities.
    columns:
      - name: company_domain_key
        description: Unique identifier for the consolidated company (normalized email domain)
        tests:
          - not_null
          - unique
      
      - name: health_score
        description: Calculated health score from 0-100 based on recency, frequency, growth, and engagement
        tests:
          - not_null
      
      - name: activity_status
        description: Current activity classification (Highly Active, Active, Moderately Active, Dormant, Inactive)
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Highly Active', 'Active', 'Moderately Active', 'Dormant', 'Inactive']
      
      - name: growth_trend_direction
        description: Year-over-year growth trend (Growing, Declining, Stable, New Customer, Lost Customer)
        tests:
