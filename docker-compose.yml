services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: yourdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  importer:
    build: ./importer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SHOPIFY_SHOP_URL: ${SHOPIFY_SHOP_URL}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN}

  dashboard:
    build:
      context: ./dashboard
      args:
        DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_BIND:-0.0.0.0}:3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb

volumes:
  pgdata:
