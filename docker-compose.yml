services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: yourdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  importer:
    build: ./importer
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb
      SHOPIFY_SHOP_URL: ${SHOPIFY_SHOP_URL}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN}

  dashboard:
    build:
      context: ./dashboard
      args:
        DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/yourdb

volumes:
  pgdata:
